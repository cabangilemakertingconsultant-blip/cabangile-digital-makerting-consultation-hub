<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Cabangile SaaS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f19;
  color: white;
}

/* LOGIN */
.login {
  max-width: 350px;
  margin: 100px auto;
  background: #111a2e;
  padding: 20px;
  border-radius: 12px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
  background: #0f172a;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #00ff88;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00cc6a;
}

/* DASHBOARD */
.dashboard {
  display: none;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.section {
  margin-bottom: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
}

h2 {
  color: #00ff88;
}

.small {
  font-size: 12px;
  color: #aaa;
}

.btn {
  margin-top: 8px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.approve { background: #00ff88; }
.danger { background: #ff4d4d; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h2>Admin Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <h1>📊 Admin Dashboard</h1>

  <div class="section">
    <h2>📩 Leads</h2>
    <div id="leads"></div>
  </div>

  <div class="section">
    <h2>💸 Withdrawals</h2>
    <div id="withdrawals"></div>
  </div>

  <div class="section">
    <h2>💰 Earnings Summary</h2>
    <div id="earnings"></div>
  </div>

  <div class="section">
    <h2>🔗 Referrals</h2>
    <div id="referrals"></div>
  </div>

</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* 🔐 ADD YOUR KEYS */
const supabase = createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_ANON_KEY"
);

/* LOGIN */
window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Login failed");
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  loadAll();
};

/* LOAD ALL DATA */
async function loadAll() {
  loadLeads();
  loadWithdrawals();
  loadEarnings();
  loadReferrals();
}

/* LEADS */
async function loadLeads() {
  const { data } = await supabase.from("leads").select("*");

  document.getElementById("leads").innerHTML =
    (data || []).map(l => `
      <div class="card">
        <b>${l.name}</b><br>
        ${l.email}<br>
        ${l.phone}<br>
        ${l.service}
      </div>
    `).join("");
}

/* WITHDRAWALS */
async function loadWithdrawals() {
  const { data } = await supabase.from("withdrawals").select("*");

  document.getElementById("withdrawals").innerHTML =
    (data || []).map(w => `
      <div class="card">
        <b>${w.name || "User"}</b><br>
        💰 R${w.amount}<br>
        📌 Status: ${w.status || "pending"}<br>

        <button class="btn approve" onclick="markPaid('${w.id}')">Mark Paid</button>
      </div>
    `).join("");
}

/* MARK PAID */
window.markPaid = async function (id) {
  await supabase
    .from("withdrawals")
    .update({ status: "paid" })
    .eq("id", id);

  alert("Marked as paid");
  loadWithdrawals();
};

/* EARNINGS */
async function loadEarnings() {
  const { data } = await supabase.from("earnings").select("*");

  let total = 0;
  let admin = 0;

  (data || []).forEach(e => {
    total += Number(e.amount || 0);
    admin += Number(e.admin_share || 0);
  });

  document.getElementById("earnings").innerHTML = `
    <div class="card">
      Total Earnings: $${total.toFixed(2)}<br>
      Admin Profit: $${admin.toFixed(2)}
    </div>
  `;
}

/* REFERRALS */
async function loadReferrals() {
  const { data } = await supabase.from("referrals").select("*");

  document.getElementById("referrals").innerHTML =
    (data || []).map(r => `
      <div class="card">
        Referrer: ${r.referrer_id}<br>
        Referred: ${r.referred_id}
      </div>
    `).join("");
}

/* AUTO REFRESH */
setInterval(loadAll, 15000);
</script>

</body>
</html
