<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Network Core Orchestration Matrix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-dark text-white">

<div class="container-fluid p-5">
    <div class="d-flex justify-content-between align-items-center mb-5 border-bottom pb-3">
        <h2>Network Operations Center (Master Framework)</h2>
        <span class="badge bg-danger px-3 py-2">Root Administrative Privilege Scope</span>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card bg-secondary text-white p-4 shadow border-0">
                <h5 class="card-title">Pending Content Authorization Ledger</h5>
                <hr class="bg-light">
                <div class="table-responsive">
                    <table class="table table-dark table-striped align-middle">
                        <thead>
                            <tr><th>User ID</th><th>Format</th><th>Channel Group</th><th>Preview Link</th><th>Action Matrix</th></tr>
                        </thead>
                        <tbody id="masterMediaRows"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card bg-secondary text-white p-4 shadow border-0 mb-4">
                <h5 class="card-title">Inject Platform Campaign Asset (Ads)</h5>
                <hr class="bg-light">
                <div class="mb-3">
                    <label class="form-label">Ad Asset Media URL</label>
                    <input type="text" id="adUrl" class="form-control bg-dark text-white border-0" placeholder="https://cdn-network.com/file.mp4">
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Format Type</label>
                        <select id="adType" class="form-select bg-dark text-white border-0">
                            <option value="video">Video Stream</option>
                            <option value="image">Static Image</option>
                        </select>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Global CPM Valuation ($)</label>
                        <input type="number" id="adCpm" class="form-control bg-dark text-white border-0" value="2.50" step="0.10">
                    </div>
                </div>
                <button class="btn btn-warning w-100 font-weight-bold" onclick="injectAdCampaign()">Deploy Ad Campaign</button>
            </div>

            <div class="card bg-secondary text-white p-4 shadow border-0">
                <h5 class="card-title">Financial Payout Clearings Queue</h5>
                <hr class="bg-light">
                <div class="table-responsive">
                    <table class="table table-dark table-hover table-striped">
                        <thead>
                            <tr><th>Vendor Reference</th><th>Amount</th><th>Status Ledger</th></tr>
                        </thead>
                        <tbody id="masterWithdrawalRows"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://your-supabase-url.supabase.co";
    const SUPABASE_KEY = "your-anon-key";
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadMasterConsole() {
        // Gather content optimization metrics
        let { data: media } = await supabase.from('media_items').select('*').eq('status', 'pending');
        let mRows = '';
        if(media && media.length > 0) {
            media.forEach(item => {
                mRows += `<tr>
                    <td>${item.user_id.slice(0,8)}</td>
                    <td>${item.type}</td>
                    <td>${item.channel}</td>
                    <td><a href="${item.url}" target="_blank" class="btn btn-sm btn-info text-white">Review Source</a></td>
                    <td>
                        <button class="btn btn-sm btn-success me-1" onclick="updateStatus('${item.id}', 'approved')">Approve</button>
                        <button class="btn btn-sm btn-danger" onclick="updateStatus('${item.id}', 'rejected')">Reject</button>
                    </td>
                </tr>`;
            });
        } else { mRows = '<tr><td colspan="5" class="text-center text-muted">Verification queue clear. No work objects detected.</td></tr>'; }
        document.getElementById('masterMediaRows').innerHTML = mRows;

        // Gather withdrawal metrics
        let { data: withdrawals } = await supabase.from('withdrawals').select('*').eq('status', 'pending');
        let wRows = '';
        if(withdrawals && withdrawals.length > 0) {
            withdrawals.forEach(w => {
                wRows += `<tr>
                    <td>${w.user_id.slice(0,8)}</td>
                    <td>$${parseFloat(w.amount).toFixed(2)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-warning" onclick="processPayout('${w.id}', 'approved')">Authorize Release</button>
                    </td>
                </tr>`;
            });
        } else { wRows = '<tr><td colspan="3" class="text-center text-muted">All withdrawal requests cleared.</td></tr>'; }
        document.getElementById('masterWithdrawalRows').innerHTML = wRows;
    }

    async function updateStatus(id, targetStatus) {
        let { error } = await supabase.from('media_items').update({ status: targetStatus }).eq('id', id);
        if(error) alert(error.message); else loadMasterConsole();
    }

    async function injectAdCampaign() {
        const url = document.getElementById('adUrl').value;
        const type = document.getElementById('adType').value;
        const cpm = document.getElementById('adCpm').value;

        if(!url) return alert("Provide working ad campaign resource path link.");
        
        let { error } = await supabase.from('ads').insert({ url, type, cpm, active: true });
        if(error) alert(error.message); else { alert("Ad System Array Update Complete."); loadMasterConsole(); }
    }

    async function processPayout(id, finalStatus) {
        let { error } = await supabase.from('withdrawals').update({ status: finalStatus }).eq('id', id);
        if(error) alert(error.message); else loadMasterConsole();
    }

    window.onload = loadMasterConsole;
</script>
</body>
</html>
